<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>South Tacoma Way - 3D Point Cloud Viewer | Psomas</title>
    <meta name="description" content="Interactive 3D Gaussian Splat visualization of the South Tacoma Way corridor">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-overlay {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px 16px;
            z-index: 10;
            user-select: none;
            -webkit-user-select: none;
            transition: opacity 0.4s ease;
        }

        .ui-btn {
            height: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
            transition: background 0.2s;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .ui-btn:hover { background: rgba(255, 255, 255, 0.22); }
        .ui-btn:active { background: rgba(255, 255, 255, 0.3); }

        #play-btn {
            width: 32px;
            padding: 0;
            border-radius: 50%;
            font-size: 14px;
        }

        .ui-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
        }

        #morph-slider {
            width: 160px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        #morph-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        #morph-label {
            font-size: 11px;
            opacity: 0.6;
            min-width: 32px;
            text-align: right;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-brand {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 8px;
            opacity: 0.9;
        }
        .loading-project {
            font-size: 13px;
            opacity: 0.4;
            letter-spacing: 1px;
            margin-bottom: 32px;
        }

        #loading-text {
            font-size: 13px;
            opacity: 0.5;
            margin-bottom: 12px;
        }

        #loading-bar-bg {
            width: 260px;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 1px;
        }
        #loading-bar {
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 1px;
            width: 0%;
            transition: width 0.3s;
        }

        #info {
            position: fixed;
            top: 16px;
            left: 16px;
            font-size: 11px;
            opacity: 0.35;
            z-index: 10;
            font-variant-numeric: tabular-nums;
        }

        #title-overlay {
            position: fixed;
            top: 24px;
            right: 24px;
            text-align: right;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            animation: fadeInTitle 1s ease-out 3s forwards;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 14px 20px;
        }
        @keyframes fadeInTitle {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #title-overlay h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        #title-overlay .subtitle {
            font-size: 12px;
            opacity: 0.55;
            letter-spacing: 0.3px;
        }
        #title-overlay .branding {
            font-size: 10px;
            opacity: 0.3;
            margin-top: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #help-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            animation: fadeHint 8s ease-out 5s forwards;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
            white-space: nowrap;
        }
        @keyframes fadeHint {
            0% { opacity: 0; }
            10% { opacity: 0.5; }
            70% { opacity: 0.5; }
            100% { opacity: 0; }
        }

        #drop-zone {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            font-size: 24px;
        }
        #drop-zone.active { display: flex; }

        /* Responsive: stack buttons on small screens */
        @media (max-width: 600px) {
            #ui-overlay {
                flex-wrap: wrap;
                justify-content: center;
                max-width: 90vw;
                bottom: 12px;
                padding: 8px 12px;
                gap: 6px;
            }
            #morph-slider { width: 120px; }
            #title-overlay h1 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="loading-overlay">
        <div class="loading-brand">PSOMAS</div>
        <div class="loading-project">South Tacoma Way &mdash; Vision Zero Corridor</div>
        <div id="loading-text">Preparing 3D visualization...</div>
        <div id="loading-bar-bg"><div id="loading-bar"></div></div>
    </div>

    <div id="ui-overlay" style="display: none;">
        <button id="play-btn" class="ui-btn">&#9654;</button>
        <input type="range" id="morph-slider" min="0" max="100" value="0">
        <span id="morph-label">0%</span>
        <div class="ui-divider"></div>
        <button id="fs-btn" class="ui-btn">Fullscreen</button>
    </div>

    <div id="info"></div>

    <div id="title-overlay">
        <h1>South Tacoma Way</h1>
        <div class="subtitle">Vision Zero Corridor &mdash; 3D Point Cloud</div>
        <div class="branding">Psomas</div>
    </div>

    <div id="help-hint">Drag to orbit &bull; Scroll to zoom &bull; Right-drag to pan &bull; Click markers for 360 view</div>

    <button id="back-btn" class="ui-btn" style="display:none; position:fixed; top:24px; left:24px; z-index:20; padding:0 16px; height:36px; font-size:13px; opacity:0; transition: opacity 0.4s ease; background:rgba(0,0,0,0.7); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.15); border-radius:8px;">
        &larr; Back to 3D
    </button>

    <div id="drop-zone">Drop .splat file here</div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
