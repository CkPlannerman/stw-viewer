<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Tacoma Way - 3D Point Cloud Viewer | Psomas</title>
    <meta name="description" content="Interactive 3D Gaussian Splat visualization of the South Tacoma Way corridor">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-overlay {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 20px;
            z-index: 10;
            user-select: none;
        }

        #play-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #play-btn:hover { background: rgba(255, 255, 255, 0.25); }

        #morph-slider {
            width: 240px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        #morph-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        #morph-label {
            font-size: 13px;
            opacity: 0.7;
            min-width: 40px;
            text-align: right;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-text {
            font-size: 16px;
            opacity: 0.7;
            margin-bottom: 16px;
        }

        #loading-bar-bg {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        #loading-bar {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }

        #info {
            position: fixed;
            top: 16px;
            left: 16px;
            font-size: 12px;
            opacity: 0.5;
            z-index: 10;
        }

        #title-overlay {
            position: fixed;
            top: 24px;
            right: 24px;
            text-align: right;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            animation: fadeInTitle 1s ease-out 3s forwards;
        }
        @keyframes fadeInTitle {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #title-overlay h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            margin-bottom: 4px;
        }
        #title-overlay .subtitle {
            font-size: 12px;
            opacity: 0.6;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
            letter-spacing: 0.3px;
        }
        #title-overlay .branding {
            font-size: 11px;
            opacity: 0.4;
            margin-top: 8px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        #drop-zone {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            font-size: 24px;
        }
        #drop-zone.active { display: flex; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="loading-overlay">
        <div id="loading-text">Loading 3D point cloud...</div>
        <div id="loading-bar-bg"><div id="loading-bar"></div></div>
    </div>

    <div id="ui-overlay" style="display: none;">
        <button id="play-btn">&#9654;</button>
        <input type="range" id="morph-slider" min="0" max="100" value="0">
        <span id="morph-label">0%</span>
    </div>

    <div id="info"></div>

    <div id="title-overlay">
        <h1>South Tacoma Way</h1>
        <div class="subtitle">Vision Zero Corridor &mdash; 3D Point Cloud</div>
        <div class="branding">Psomas</div>
    </div>

    <div id="drop-zone">Drop .splat file here</div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
